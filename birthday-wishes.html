<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎂 Birthday Wishes for Winnie 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        .glow-particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, #fff, #ff6b9d);
            border-radius: 50%;
            pointer-events: none;
            animation: floatGlow linear infinite;
        }

        @keyframes floatGlow {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(0); opacity: 0; }
        }

        .wishes-container {
            background: rgba(255,255,255,0.95);
            border-radius: 40px;
            padding: 2.5rem;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.8s ease;
            position: relative;
            z-index: 10;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .birthday-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .cake-icon { font-size: 3rem; animation: bounce 2s infinite; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        h1 { font-size: 2rem; color: #f5576c; margin: 1rem 0; }

        .message-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #333;
            margin: 2rem 0;
        }

        .typing-effect { border-right: 3px solid #f5576c; white-space: pre-wrap; }
        .signature { text-align: right; font-style: italic; margin-top: 2rem; padding-top: 1rem; border-top: 2px solid #f0f0f0; color: #f5576c; }

        .nav-buttons { display: flex; justify-content: space-between; margin-top: 2rem; gap: 1rem; }
        .nav-btn {
            background: linear-gradient(45deg, #f5576c, #f093fb);
            border: none; padding: 0.8rem 1.8rem; font-size: 1rem; font-weight: 600;
            color: white; border-radius: 50px; cursor: pointer; transition: all 0.3s; flex: 1;
        }
        .nav-btn.prev { background: linear-gradient(45deg, #667eea, #764ba2); }
        .nav-btn:hover { transform: scale(1.02); }

        .page-counter { text-align: center; margin-top: 1rem; color: #999; font-size: 0.8rem; }

        @media (max-width: 768px) {
            .wishes-container { padding: 1.5rem; }
            h1 { font-size: 1.5rem; }
            .message-content { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="wishes-container">
        <div class="birthday-header">
            <div class="cake-icon">🎂❤️</div>
            <h1>Happy Birthday,Winnie/pookie!</h1>
        </div>
        <div class="message-content">
            <div id="typingText" class="typing-effect"></div>
        </div>
        <div class="signature"> Yours, Tom 💌</div>
        <div class="nav-buttons">
            <button class="nav-btn prev" onclick="goBack()">← Previous</button>
            <button class="nav-btn next" onclick="goNext()">Next →</button>
        </div>
        <div class="page-counter">Page 2 of 8</div>
    </div>

    <script>
        const fullMessage = `🎂 My dearest Winnie,\n\nOn this beautiful day, I celebrate not just your birthday, but the gift of having you in my life. You bring sunshine to my darkest days, laughter to my saddest moments, and love to my entire existence.\n\nMay this year bring you everything your heart desires and more. You deserve all the happiness, joy, and love this world has to offer.\n\nThank you for being you—amazing, beautiful, and absolutely irreplaceable. I thank God every day for bringing you into my life.\n\nI love you more than words can express. 💕`;

        let i = 0;
        const typingDiv = document.getElementById('typingText');
        
        function typeWriter() {
            if (i < fullMessage.length) {
                typingDiv.innerHTML += fullMessage.charAt(i);
                i++;
                setTimeout(typeWriter, 35);
            } else {
                typingDiv.style.borderRight = 'none';
            }
        }
        typeWriter();
        
        // Particles
        for(let i = 0; i < 80; i++) {
            const p = document.createElement('div');
            p.className = 'glow-particle';
            p.style.width = (Math.random() * 4 + 1) + 'px';
            p.style.height = p.style.width;
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = Math.random() * 5 + 3 + 's';
            document.body.appendChild(p);
        }
        
        function goBack() { window.location.href = 'love-letter.html'; }
        function goNext() { window.location.href = 'heart-animation.html'; }
    </script>
    <script src="music.js"></script>
</body>
</html>
