<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎁 Forever Yours -Winnie</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff3366, #ff6b9d, #ff3366);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', 'Georgia', serif;
            overflow: hidden;
            position: relative;
        }
        @keyframes gradientShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .final-container { text-align: center; z-index: 10; animation: fadeInUp 1s ease; padding: 2rem; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        .giant-heart { font-size: 6rem; animation: heartPulse 1.2s infinite; filter: drop-shadow(0 0 30px rgba(255,255,255,0.8)); }
        @keyframes heartPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .final-message { color: white; font-size: 2rem; margin: 1.5rem 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        .signature { color: white; font-size: 1.3rem; font-style: italic; margin-top: 1rem; }
        .nav-buttons {
            position: fixed; bottom: 20px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 1rem; z-index: 100;
        }
        .nav-btn {
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            padding: 10px 25px; border-radius: 50px; color: white;
            border: 1px solid rgba(255,255,255,0.3); cursor: pointer;
            font-size: 1rem;
        }
        .nav-btn:hover { background: rgba(0,0,0,0.7); transform: scale(1.05); }
        .page-counter {
            position: fixed; bottom: 20px; left: 20px;
            color: rgba(255,255,255,0.7); font-size: 0.8rem;
            background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 20px;
        }
        @media (max-width: 768px) {
            .giant-heart { font-size: 4rem; }
            .final-message { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="final-container">
        <div class="giant-heart">💖</div>
        <div class="final-message">Happy Birthday Once AgainWinnie 🎂❤️</div>
        <div class="signature">Forever Yours,<br>Tom💌</div>
    </div>
    <div class="nav-buttons">
        <button class="nav-btn" onclick="goBack()">← Previous</button>
        <button class="nav-btn" onclick="goHome()">🏠 Start Over</button>
    </div>
    <div class="page-counter">Page 5 of 5 - The End 💕</div>

    <script>
        function goBack() { window.location.href = 'secret-message.html'; }
        function goHome() { window.location.href = 'index.html'; }
    </script>
    <script src="music.js"></script>
</body>
</html>
