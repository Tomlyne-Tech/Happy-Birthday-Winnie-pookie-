<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>❤️ Heart Formation -Winnie ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a0033, #0a001a);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            position: relative;
        }
        canvas {
            display: block;
            max-width: 90%;
            height: auto;
            box-shadow: 0 0 50px rgba(255,51,102,0.3);
            border-radius: 20px;
        }
        .heart-message {
            color: white;
            font-size: 1.8rem;
            margin-top: 20px;
            text-align: center;
            animation: glow 1.5s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 5px #ff3366; }
            to { text-shadow: 0 0 20px #ff3366, 0 0 30px #ff6b9d; }
        }
        .nav-buttons {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 1rem;
            z-index: 100;
            padding: 0 1rem;
        }
        .nav-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 50px;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .page-counter {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas" width="550" height="450"></canvas>
    <div class="heart-message" id="heartMessage" style="opacity: 0;">🎂 Happy Birthday winnie, Always at heart 🎂❤️</div>
    <div class="nav-buttons">
        <button class="nav-btn" onclick="goBack()">← Previous</button>
        <button class="nav-btn" onclick="goNext()">Next →</button>
    </div>
    <div class="page-counter">Page 3 of 5</div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 40, 550);
            canvas.width = size;
            canvas.height = size * 0.8;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        function getHeartPoints(t) {
            const angle = t * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(angle), 3);
            const y = 13 * Math.cos(angle) - 5 * Math.cos(2*angle) - 2 * Math.cos(3*angle) - Math.cos(4*angle);
            return { x: x * 12 + canvas.width/2, y: -y * 12 + canvas.height/2 };
        }

        let progress = 0;
        const particleCount = 700;
        
        function animateHeart() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            progress += 0.01;
            
            if(progress >= 1) {
                document.getElementById('heartMessage').style.opacity = '1';
                return;
            }
            
            const targetCount = Math.floor(particleCount * progress);
            for(let i = 0; i < particleCount; i++) {
                let x, y;
                if(i < targetCount) {
                    const t = i / particleCount;
                    const heartPoint = getHeartPoints(t);
                    x = heartPoint.x + (Math.random() - 0.5) * 5;
                    y = heartPoint.y + (Math.random() - 0.5) * 5;
                } else {
                    x = Math.random() * canvas.width;
                    y = Math.random() * canvas.height;
                }
                ctx.beginPath();
                ctx.arc(x, y, Math.random() * 3 + 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 80, 120, ${0.7})`;
                ctx.fill();
            }
            requestAnimationFrame(animateHeart);
        }
        animateHeart();
        
        function goBack() { window.location.href = 'birthday-wishes.html'; }
        function goNext() { window.location.href = 'secret-message.html'; }
    </script>
    <script src="music.js"></script>
</body>
</html>
