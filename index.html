<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ A Special Surprise for winnie ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0015 100%);
            font-family: 'Playfair Display', 'Georgia', serif;
            overflow: hidden;
            position: relative;
        }

        /* Floating glowing particles */
        .glow-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #ff6b9d, #ff3366);
            border-radius: 50%;
            pointer-events: none;
            animation: floatGlow linear infinite;
            box-shadow: 0 0 10px #ff6b9d;
        }

        @keyframes floatGlow {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-10vh) scale(0);
                opacity: 0;
            }
        }

        /* Floating hearts */
        .floating-heart {
            position: absolute;
            pointer-events: none;
            animation: floatHeart 8s linear infinite;
            filter: drop-shadow(0 0 5px #ff6b9d);
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .welcome-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 500px;
        }

        /* Profile Picture Frame */
        .profile-frame {
            width: 200px;
            height: 200px;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .profile-picture {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ff6b9d;
            box-shadow: 0 0 30px rgba(255,107,157,0.5);
            animation: glowPulse 2s infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255,107,157,0.5); border-color: #ff6b9d; }
            50% { box-shadow: 0 0 50px rgba(255,107,157,0.8); border-color: #ff3366; }
        }

        .heart-overlay {
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 2rem;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .main-title {
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            background: linear-gradient(45deg, #ff6b9d, #ff3366, #ff6b9d);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 3s linear infinite;
            margin-bottom: 1rem;
            font-weight: bold;
        }

        @keyframes shine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1rem;
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }

        .begin-btn {
            background: linear-gradient(45deg, #ff3366, #ff6b9d);
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(255,51,102,0.5);
            animation: pulse 2s infinite;
        }

        .begin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255,51,102,0.8);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .song-info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.7rem;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .profile-frame { width: 150px; height: 150px; }
            .heart-overlay { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div id="particles"></div>
    <div class="welcome-container">
        <div class="profile-frame">
            <!-- Replace this image URL with Esther's actual photo -->
            <img class="profile-picture" id="WinniePhoto" src="Winnie profile.jpeg.jpeg" alt="Winnie">
            <div class="heart-overlay">❤️</div>
        </div>
        <div class="main-title">🎉 A Special Birthday Surprise For You Winnie 🎉</div>
<div class="subtitle">A journey through your smiles, memories, and all the beautiful moments that make you amazing</div>
<button class="begin-btn" onclick="startJourney()">🎂 Begin Your Birthday Celebration 🎂</button>
    </div>
    <div class="song-info">🎵 "All of Me" by John Legend playing softly 🎵</div>

    <script>
        let audio = null;
        
        function initMusic() {
            audio = new Audio();
            audio.loop = true;
            audio.volume = 0.3;
            audio.src = 'all-of-me.mp3';
            audio.addEventListener('error', function() {
                // Fallback to online piano cover if local file not found
                audio.src = 'John Legend - All of Me (Lyrics) - 7clouds (youtube).mp3';
                audio.load();
                audio.play().catch(e => console.log('Auto-play attempt'));
            });
            
            // Auto-play music
            audio.play().catch(e => {
                console.log('Auto-play blocked, will play on user interaction');
                document.body.addEventListener('click', function playOnce() {
                    audio.play();
                    document.body.removeEventListener('click', playOnce);
                }, { once: true });
            });
        }
        
        // Create floating glowing particles
        function createGlowParticles() {
            const container = document.getElementById('particles');
            for(let i = 0; i < 120; i++) {
                const particle = document.createElement('div');
                particle.className = 'glow-particle';
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 6 + 3 + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }
        
        // Create floating hearts
        const hearts = ['❤️', '💖', '💗', '💓', '💕', '💝'];
        for(let i = 0; i < 60; i++) {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = Math.random() * 25 + 12 + 'px';
            heart.style.animationDuration = Math.random() * 6 + 4 + 's';
            heart.style.animationDelay = Math.random() * 8 + 's';
            document.body.appendChild(heart);
        }
        
        createGlowParticles();
        initMusic();

        function startJourney() {
            // Ensure music is playing
            if(audio && audio.paused) {
                audio.play().catch(() => {});
            }
            window.location.href = 'love-letter.html';
        }
        
        // Try to load Esther's photo from local file
        const savedPhoto = localStorage.getItem('estherPhoto');
        if(savedPhoto) {
            document.getElementById('estherPhoto').src = savedPhoto;
        }
    </script>
</body>
</html>
